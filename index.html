<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2Z STORY GAMER | Official Links</title>
    <link rel="icon" type="image/png" href="untitled-2.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-black: #05000a;
            --neon-purple: #bc13fe;
            --dark-purple: #4b0082;
            --cyan-accent: #00d2ff;
            --glass: rgba(188, 19, 254, 0.05);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --youtube-red: #FF0000;
            --instagram-pink: #E1306C;
            --whatsapp-green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Share Button */
        .share-container { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .share-btn {
            background: var(--glass);
            border: 1px solid rgba(188, 19, 254, 0.3);
            padding: 10px; border-radius: 50%; cursor: pointer;
            backdrop-filter: blur(10px); transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .share-btn:hover { border-color: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); transform: scale(1.1); }
        .share-btn svg { fill: white; width: 20px; height: 20px; }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% -20%, var(--dark-purple), transparent 50%),
                radial-gradient(circle at 50% 120%, var(--deep-black), transparent 50%);
            z-index: -1;
        }

        .profile { text-align: center; margin-bottom: 20px; animation: fadeInDown 1s forwards; }
        .pfp-container { position: relative; display: inline-block; margin-bottom: 20px; }
        
        /* LOGO STYLING */
        .pfp {
            width: 120px; height: 120px;
            border-radius: 20px; 
            border: 2px solid var(--neon-purple);
            object-fit: cover;
            background: #000;
            position: relative;
            z-index: 2;
        }

        .aura {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 20px; box-shadow: 0 0 25px var(--neon-purple);
            animation: pulse 2s infinite; z-index: 1;
        }

        .glitch-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 4px;
            color: white; text-shadow: 0 0 10px var(--neon-purple);
        }

        .subtitle { color: #888; letter-spacing: 2px; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 20px; }

        .social-icons { display: flex; justify-content: center; gap: 25px; margin-bottom: 40px; animation: fadeIn 1.5s forwards; }
        .social-icons a { width: 28px; height: 28px; transition: var(--transition); }
        .icon-ig { fill: var(--instagram-pink); }
        .icon-yt { fill: var(--youtube-red); }
        .icon-wa { fill: var(--whatsapp-green); }
        .social-icons a:hover { transform: translateY(-5px); filter: drop-shadow(0 0 8px currentColor); }

        .links-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .btn-link {
            position: relative; background: var(--glass);
            border: 1px solid rgba(188, 19, 254, 0.2);
            padding: 18px; border-radius: 8px; text-decoration: none;
            color: white; font-weight: 700; text-align: center;
            font-size: 1rem; letter-spacing: 2px; text-transform: uppercase;
            transition: var(--transition); overflow: hidden;
            backdrop-filter: blur(10px); opacity: 0; transform: translateY(20px);
            animation: fadeInUp 0.5s forwards;
        }

        .btn-link:hover { transform: scale(1.05) skewX(-3deg); }
        .yt-hover:hover { background: var(--youtube-red); border-color: var(--youtube-red); }
        .ig-hover:hover { background: var(--instagram-pink); border-color: var(--instagram-pink); }
        .wa-hover:hover { background: var(--whatsapp-green); border-color: var(--whatsapp-green); color: black; }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 0.3; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer { margin-top: auto; padding: 40px 0; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.3; }
    </style>
</head>

    <script>
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'A2Z STORY GAMER',
                    text: 'Connect with A2Z Story Gamer!',
                    url: window.location.href,
                }).catch(console.error);
            } else {
                const el = document.createElement('textarea');
                el.value = window.location.href;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert('Link copied to clipboard!');
            }
        }
